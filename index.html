<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trading Tools</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b1120;
    --surface: #111c30;
    --surface2: #172440;
    --border: rgba(100,160,255,0.1);
    --border2: rgba(100,160,255,0.25);
    --text: #e8f0ff;
    --muted: #7a9ac0;
    --accent: #60c8ff;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  header h1 {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }

  header p {
    font-size: 13px;
    color: var(--muted);
    font-family: var(--mono);
  }

  .tools {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 420px;
  }

  .tool-card {
    display: block;
    text-decoration: none;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 24px 28px;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
  }

  .tool-card:hover, .tool-card:active {
    border-color: var(--accent);
    background: var(--surface2);
    transform: translateY(-2px);
  }

  .tool-card .icon {
    font-size: 28px;
    margin-bottom: 12px;
  }

  .tool-card .title {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 500;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .tool-card .desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  .tool-card .arrow {
    display: inline-block;
    margin-top: 14px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  footer {
    margin-top: 48px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
  }
</style>
</head>
<body>

  <header>
    <h1>trading_tools</h1>
    <p>your personal trading dashboard</p>
  </header>

  <div class="tools">
    <a class="tool-card" href="confluence-scanner.html">
      <div class="icon">🔀</div>
      <div class="title">Confluence Scanner</div>
      <div class="desc">Scan for stocks where multiple signals align</div>
      <div class="arrow">open →</div>
    </a>
    <a class="tool-card" href="signal-scanner.html">
      <div class="icon">📡</div>
      <div class="title">Signal Scanner</div>
      <div class="desc">Live trading signals across NASDAQ 100 strategies</div>
      <div class="arrow">open →</div>
    </a>
    <a class="tool-card" href="trade-planner.html">
      <div class="icon">📋</div>
      <div class="title">Trade Planner</div>
      <div class="desc">Plan and manage your trades</div>
      <div class="arrow">open →</div>
    </a>
  </div>

  <footer>stocks / equities · USD</footer>

</body>
</html>
